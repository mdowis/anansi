name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs: a newer push to the same ref makes older in-progress
# runs pointless, so don't burn runner minutes finishing them.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # NOTE: install [dev] only, NOT [tls]. curl-cffi being absent is a test
      # assumption — tests/test_smart.py exercises the httpx fallback path so
      # respx can intercept it. The browser tests use stubs, so Playwright
      # browser binaries are not installed here.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q
